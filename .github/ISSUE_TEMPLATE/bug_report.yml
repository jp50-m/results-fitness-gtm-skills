name: "\U0001F41B Skill Bug Report"
description: Report incorrect skill behavior, wrong advice, missing context, or broken skill activation
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. The more detail you include, the faster we can fix the issue.

  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight Checklist
      options:
        - label: I have searched [existing issues](https://github.com/manojbajaj95/claude-gtm-plugin/issues) for duplicates
          required: true
        - label: I am using the latest version of the plugin
          required: false

  - type: input
    id: skill_name
    attributes:
      label: Skill Name
      description: Which skill exhibited the incorrect behavior?
      placeholder: e.g. seo-and-aeo-strategy, copywriting-core, linkedin-content
    validations:
      required: true

  - type: dropdown
    id: bug_type
    attributes:
      label: Type of Issue
      description: What kind of problem did you encounter?
      options:
        - Wrong or harmful advice generated
        - Skill not activating when it should
        - Skill activating when it shouldn't
        - Missing context (brand/voice not applied)
        - Incorrect output format
        - Skill errors or crashes mid-execution
        - Other
    validations:
      required: true

  - type: textarea
    id: prompt_used
    attributes:
      label: What did you ask Claude?
      description: The exact prompt or task description you gave Claude when the issue occurred.
      placeholder: "e.g. 'Audit the SEO on my landing page at example.com'"
    validations:
      required: true

  - type: textarea
    id: actual_output
    attributes:
      label: What happened?
      description: What did Claude actually do or output? Include the relevant portion of the response.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected_output
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Install the plugin via `claude plugin install gtm-skills@claude-gtm-plugins`
        2. Run `/bootstrap` and complete the onboarding
        3. Ask Claude: "..."
        4. Observe incorrect output in the response

  - type: checkboxes
    id: context_files
    attributes:
      label: Context Files Present
      description: Which context files existed in your project when this happened? Missing context is the most common cause of "wrong advice" bugs.
      options:
        - label: "`strategy/brand.md` (brand positioning, messaging, audience)"
        - label: "`about/me.md` (personal voice, writing style)"
        - label: "`CLAUDE.md` (AI instructions)"
        - label: "None — I haven't run `/bootstrap` yet"

  - type: dropdown
    id: regression
    attributes:
      label: Is this a regression?
      description: Did this skill work correctly in a previous version?
      options:
        - "Yes, this worked before"
        - "No, this never worked"
        - "I don't know"
    validations:
      required: false

  - type: input
    id: plugin_version
    attributes:
      label: Plugin Version
      description: "Check `.claude-plugin/plugin.json` for the version number."
      placeholder: e.g. 1.3.0
    validations:
      required: false

  - type: dropdown
    id: install_method
    attributes:
      label: Installation Method
      options:
        - Claude Code (`claude plugin install`)
        - Claude Cowork (marketplace)
        - Skills CLI (`npx skills add`)
        - Git clone (local)
        - Git submodule
    validations:
      required: false

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How much did this affect your work?
      options:
        - Critical — produced harmful or clearly wrong advice that could damage business
        - High — significant incorrect output requiring manual rework
        - Medium — partially wrong, extra effort to fix
        - Low — minor issue, easy to work around
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or logs that might help.
